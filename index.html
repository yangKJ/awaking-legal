<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Awaking 与照惜的产品官网入口。" />
  <meta name="theme-color" content="#0b0c0b" />
  <link rel="canonical" href="https://yangkj.github.io/awaking-legal/" />
  <link rel="icon" type="image/png" href="./awaking/assets/app-icon.png" />
  <title>Awaking 与照惜 · 产品官网</title>
  <style>
    :root { color-scheme: dark; --bg: #080a08; --panel: #111411; --ink: #f4f6f1; --muted: #9da49a; --line: rgba(225, 235, 217, 0.12); --green: #9ad62d; --amber: #e4a86c; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: radial-gradient(circle at 18% 4%, rgba(154, 214, 45, 0.11), transparent 28rem), radial-gradient(circle at 88% 88%, rgba(228, 168, 108, 0.1), transparent 28rem), var(--bg); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-font-smoothing: antialiased; }
    main { width: min(100% - 40px, 1120px); margin: 0 auto; padding: clamp(74px, 11vw, 150px) 0 70px; }
    .eyebrow { margin: 0 0 18px; color: var(--muted); font-size: 12px; font-weight: 750; letter-spacing: .16em; text-transform: uppercase; }
    h1 { max-width: 820px; margin: 0; font-size: clamp(44px, 7vw, 82px); line-height: 1.06; letter-spacing: -.06em; }
    .lead { max-width: 660px; margin: 24px 0 0; color: var(--muted); font-size: 18px; line-height: 1.8; }
    .product-grid { margin-top: clamp(58px, 9vw, 100px); display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .product-card { position: relative; min-height: 390px; padding: clamp(30px, 5vw, 50px); overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 30px; color: var(--ink); background: var(--panel); text-decoration: none; transition: transform 180ms ease, border-color 180ms ease; }
    .product-card:hover { transform: translateY(-4px); }
    .product-card.awaking:hover { border-color: rgba(154, 214, 45, 0.42); }
    .product-card.zhaoxi:hover { border-color: rgba(228, 168, 108, 0.42); }
    .product-card::after { position: absolute; right: -90px; bottom: -130px; width: 310px; height: 310px; border-radius: 50%; content: ""; filter: blur(1px); }
    .awaking::after { background: rgba(154, 214, 45, 0.08); }
    .zhaoxi::after { background: rgba(228, 168, 108, 0.09); }
    .product-card img { position: relative; z-index: 1; width: 76px; height: 76px; border-radius: 22.5%; box-shadow: 0 18px 38px rgba(0, 0, 0, .25); }
    .product-copy { position: relative; z-index: 1; margin-top: auto; }
    .product-copy span { font-size: 11px; font-weight: 780; letter-spacing: .12em; text-transform: uppercase; }
    .awaking .product-copy span { color: var(--green); }
    .zhaoxi .product-copy span { color: var(--amber); }
    h2 { margin: 9px 0 0; font-size: clamp(30px, 4vw, 48px); letter-spacing: -.04em; }
    .product-copy p { max-width: 440px; margin: 12px 0 0; color: var(--muted); line-height: 1.72; }
    footer { margin-top: 58px; padding-top: 24px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; }
    @media (max-width: 720px) { main { width: min(100% - 28px, 1120px); padding-top: 58px; } .product-grid { grid-template-columns: 1fr; } .product-card { min-height: 330px; border-radius: 24px; } }
    @media (prefers-reduced-motion: reduce) { * { transition-duration: .01ms !important; } }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Product websites</p>
    <h1>两个产品，<br />各自清楚地表达自己。</h1>
    <p class="lead">这里是 Awaking 与照惜的官网入口。每个产品拥有独立的品牌、功能说明、技术支持与法律页面。</p>
    <div class="product-grid">
      <a class="product-card awaking" href="./awaking/">
        <img src="./awaking/assets/app-icon.png" alt="Awaking App 图标" width="76" height="76" />
        <div class="product-copy"><span>On-device photo editor</span><h2>Awaking</h2><p>本地滤镜、蒙版、调色、构图、拼接与导出工具。</p></div>
      </a>
      <a class="product-card zhaoxi" href="./zhaoxi/">
        <img src="./zhaoxi/assets/app-icon.png" alt="照惜 App 图标" width="76" height="76" />
        <div class="product-copy"><span>私人回忆</span><h2>照惜</h2><p>像刷短视频一样重看自己的生活，想决定时再慢慢决定。</p></div>
      </a>
    </div>
    <footer>© 2026 Awaking &amp; 照惜</footer>
  </main>
</body>
</html>
